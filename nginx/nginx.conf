# CodeMap - Nginx reverse proxy
# One public door. Routes:
#   /api/*  -> backend  (Node.js API on port 4000)
#   /*      -> frontend (Next.js on port 3000)

events {
  worker_connections 1024;
}

http {
  # Don't tell attackers our nginx version
  server_tokens off;

  server {
    listen 80;

    # ---- API traffic ----
    location /api/ {
      # strip the /api prefix before forwarding: /api/analyze -> /analyze
      proxy_pass http://backend:4000/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      # Analysis can take a while on big repos
      proxy_read_timeout 120s;
    }

    # ---- Everything else: the Next.js app ----
    location / {
      proxy_pass http://frontend:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      # Needed for Next.js hot reload (dev) and streaming
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
